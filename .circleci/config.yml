version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/base:stable  # Image dasar Ubuntu dari CircleCI
    steps:
      - checkout  # Checkout kode dari repositori

      - setup_remote_docker:  # Siapkan lingkungan Docker terpisah
          version: 20.10.7  # Versi Docker yang mendukung Buildx

      - run:
          name: Install Docker Buildx
          command: |
            mkdir -vp ~/.docker/cli-plugins/
            curl -L -o ~/.docker/cli-plugins/docker-buildx https://github.com/docker/buildx/releases/download/v0.8.2/buildx-v0.8.2.linux-amd64
            chmod a+x ~/.docker/cli-plugins/docker-buildx
            docker buildx version

      - run:
          name: Log in to Docker Hub
          command: |
            echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin

      - run:
          name: Set up Docker Buildx
          command: |
            docker buildx create --use
            docker buildx inspect --bootstrap

      - run:
          name: Build and Push Docker Image
          command: |
            # Tentukan tag berdasarkan tag Git atau branch
            TAG=$(if [ -n "$CIRCLE_TAG" ]; then echo "$CIRCLE_TAG"; else echo "latest"; fi)
            IMAGE_NAME="cloudzure/sdns-test"

            # Bangun dan dorong image untuk linux/arm64
            docker buildx build \
              --platform linux/arm64 \
              --tag $IMAGE_NAME:$TAG \
              --push \
              .

workflows:
  build-and-push-workflow:
    jobs:
      - build-and-push:
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+.*/
            branches:
              only: master
